name: lahan_attendance_app
description: تطبيق متابعة حضور حصة ألحان 3 إعدادي و1 ثانوي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Local storage (Offline First)
  hive: ^2.2.3
